<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Write</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <div class="keyborad">
      <div class="num-raw raw">
        <button class="button orange">`</button>
        <button class="button red ">1</button>
        <button class="button red ">2</button>
        <button class="button pink ">3</button>
        <button class="button green">4</button>
        <button class="button blue">5</button>
        <button class="button blue">6</button>
        <button class="button yellow">7</button>
        <button class="button green">8</button>
        <button class="button pink ">9</button>
        <button class="button red ">0</button>
        <button class="button red ">-</button>
        <button class="button red ">=</button>
        <button class="button w-100 orange">←</button>
      </div>
      <div class="tab-raw raw">
        <button class="button w-100 orange">TAB</button>
        <button class="button red ">Q</button>
        <button class="button pink ">W</button>
        <button class="button green">E</button>
        <button class="button blue">R</button>
        <button class="button blue">T</button>
        <button class="button yellow">Y</button>
        <button class="button yellow">U</button>
        <button class="button green">I</button>
        <button class="button pink ">O</button>
        <button class="button red ">P</button>
        <button class="button red ">[</button>
        <button class="button red ">]</button>
        <button class="button orange ">\</button>
      </div>
      <div class="caps-raw raw">
        <button class="button w-100 orange">CAPS</button>
        <button class="button red">A</button>
        <button class="button pink ">S</button>
        <button class="button green">D</button>
        <button class="button blue">F</button>
        <button class="button blue">G</button>
        <button class="button yellow">H</button>
        <button class="button yellow">J</button>
        <button class="button green">K</button>
        <button class="button pink">L</button>
        <button class="button red">;</button>
        <button class="button red">'</button>
        <button class="button w-100 orange">ENTER</button>
      </div>
      <div class="shift-raw raw">
        <button class="button w-100 orange">SHIFT</button>
        <button class="button red">Z</button>
        <button class="button pink ">X</button>
        <button class="button green">C</button>
        <button class="button blue">V</button>
        <button class="button blue">B</button>
        <button class="button yellow">N</button>
        <button class="button yellow">M</button>
        <button class="button green">,</button>
        <button class="button pink">.</button>
        <button class="button red ">/</button>
        <button class="button w-100 orange">SHIFT</button>
      </div>
      <div class="ctrl-raw raw">
        <button class="button space orange "> </button>
      </div>
    </div>



    <script src="./index.js"></script>
  </body>
</html>
